<!DOCTYPE html>
<html lang="en">
<head>
<!-- Foster Lancaster -->
<title>fostmp3s version 3.0</title>

<!-- Style Sheets -->

<!-- Fost Mp3's
<iframe src="https://fosterlancaster.github.io/fostmp3s" style="width: 400px; height: 400px; min-height: 400px; min-width: 200px; max-height: 100%; display: block; border: none;" class="fostmp3s"></iframe>
Fost Mp3's -->

<style>
a {
  text-decoration: none;
  color: #000000;
}
button {
  outline: none;
}
html,
body {
  margin: 0;
  padding: 0;
  font-family: 'futura';
}
/* Hide default audio controls */
.fostmp3s {
  display: block;
}
audio {
  display: none;
}
.audio-player-container img.default-image {
  display: block;
}
.audio-player-container img.playing {
  display: none;
}
#PayOff {
  display: none;
  position: relative;
 }
 #PayOn {
  width: calc(100% - 1px);
  display: block;
  position: relative;
 }
td {
  padding: 0;
}
table {
  border-spacing: 0;
}
.volumeContainer:hover, 
.nextprev-btn:hover, 
.embedBtn:hover, 
.chatBtn:hover {
  background-color: rgba(255, 255, 255, .8);
}
.EngageBar td:hover {
  background-color: rgba(255, 255, 255, .8);
}
.progressBar:hover {
  background-color: #7D7F7C;
}
 .LancasterFrame {
  font-size: 18px;
  width: calc(100vw - 2px);
  height: calc(100vh - 2px);
  overflow: hidden;
  position: relative;
  z-index: 2;
  opacity: 1;
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  background-color: rgba(255, 255, 255, .1);
  background-image: linear-gradient(to top, rgba(0, 0, 0, .4), transparent, rgba(0, 0, 0, .4));
  background-size: 100% 400px;
  background-position: center center;
  animation: rise 4s linear infinite;
  border: solid 1px #ffffff;
}
.LancasterFrame:hover .ControlBar {
  height: 40px;
}
.LancasterFrame:hover .PasswordBar {
  height: 40px;
  opacity: 1;
}
.LancasterFrame:hover .MusicHeader {
  padding: 0px;
}
#playBtn:hover .moreInfo {
  opacity: 1;
}
#buyBtn:hover .moreInfo {
  opacity: 1;
}
.PasswordBar:hover .PasswordSubmit {
  width: 100px;
  max-width: 100px;
}
.MusicHeader {
  transition-duration: .2s;
  padding: 40px 0px 40px 0px;
  position: relative;
  text-align: left;
  max-height: 250px;
  overflow: hidden;
  max-width: 100%;
}
 .LancasterMusicPlayer {
  width: 100%;
  height: 100%; /* Important */
  text-align: center;
  color: #d3d3d3;
  position: relative;
  overflow: hidden;
  background-image: url('fmp3simages/FostBranding.png');
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}
/*----Bars----*/
.Password {
  font-size: 19px;
  font-family: 'Futura';
  line-height: 40px;
  height: 40px;
  padding: 0 10px;
  box-sizing: border-box;
  margin: 0px;
  text-indent: 5px;
  width: 100%;
  max-width: 100%;
  -webkit-appearance: none;
  color: #ffffff;
  appearance: none;
  flex-grow: 1; /* if in a flex container */
  min-width: 0; /* prevent overflow in flex */
  overflow: hidden;
  background-color: transparent;
  border: none;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.PasswordSubmit {
  transition-duration: .1s;
  font-size: 19px;
  font-family: 'futura';
  height: 40px;
  margin: 0px;
  width: 0px;
  max-width: 0px;
  color: #ffffff;
  text-align: center;
  cursor: pointer;
  user-select: none; /* prevent highlighting text */
  pointer-events: auto;
  background-color: #ffffff;
}
.PasswordSubmit:hover {
  background-color: rgba(0, 0, 0, .5);
}
.PasswordBar {
  max-height: 40px;
  line-height: 40px;
  height: 0px;
  opacity: 0;
  transition-duration: .2s;
  width: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  width: calc(100% - 12px);
  overflow: hidden;
  border-radius: 90px;
  background-position: 30px center;
  background-size: auto 30px;
  background-attachment: scroll;
  background-repeat: no-repeat;
  border: double 5px #ffffff;
  background-color: #000000;
  background-image: url('fmp3simages/FostMp3sLogoBW.png');
}
/* PasswordUnlockBar */
.PasswordUnlockBar {
  position: relative;
  width: 100%;
  left: 0px;
  overflow: hidden;
  margin: 0px;
  background-color: transparent;
}
.EngageBar {
  height: 93px;
  display: block;
  overflow: hidden;
}
.EngageBar table {
  height: 93px;
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;        /* 🔑 forces equal-width cells */
}
.EngageBar td {                 /* each td = half */
  text-align: center;
  vertical-align: middle;     /* vertical center for table */
  padding: 0;
  outline: none;
  box-shadow: none;
}
/* Center content inside each td */
.EngageBar td > * {
  justify-content: center;
  align-items: center;
  display: flex;
  height: 100%;
  width: 100%;
}
.EngageBar td:focus,
.EngageBar td:active {
  outline: none;
  box-shadow: none;
}
.ControlBar {
  max-height: 40px;
  line-height: 40px;
  height: 0px;
  transition: height .2s ease;
  overflow: hidden;
  display: flex;
  align-items: center;      
  border: none;
  justify-content: center;
  border-top: none;
  position: relative;
  z-index: 3;
}
.songSelection {
  height: 100%;
  overflow-y: scroll;
  position: relative;
  opacity: 0;
  display: block;
  z-index: 3;
}
.songSelection:hover {
  opacity: 1;
}
/*------100vh Controls Sum Landscape = 207px (with frame) + 185px (without frame)-------*/
/*----Bars----*/
.songSelection:hover .Seven{
  background-image: none;
}
.Seven:hover {
  background-image: none;
}
.Seven {
  width: calc(100% - 22px);
  margin-left: auto;
  margin-right: auto;
  height: calc(100vh - 207px);
  border: solid 11px rgba(150, 150, 150, .3);
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  position: relative; /* important */
  opacity: 1;
  background-image: url('fmp3simages/SongSelect.png');
  background-size: auto 40%;
  background-position: center center;
  background-repeat: no-repeat;
  overflow: hidden;
}
.shuffleBtn {
  position: relative;
  opacity: 1 !important;
  cursor: pointer;
  height: 38px;
  width: 100%;
  border-radius: 0px;
  z-index: 999;
  background-color: transparent;
  text-align: center;
  background-image: url('fmp3simages/Shuffle.png');
  background-size: 38px 38px;
  background-position: center center;
  background-repeat: no-repeat;
}
.shuffleBtn:hover {
  background-color: #ffffff;
}
.OffMusicHeader {
  height: calc(100vh - 185px);
  min-height: calc(100vh - 185px);
  width: 100%;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  color: #ffffff;
  font-size: 7vw;
  text-decoration: underline;
  max-width: 95%;
  overflow: hidden;
}
.song-button {
  font-family: 'futura';
  font-size: 18px;
  color: #ffffff;
  -webkit-text-stroke: .05em #000000;
  position: relative;
  width: calc(100% - 1px);
  margin: 1px 0px 1px 0px;
  overflow: hidden;
  height: 38px;
  line-height: 18px;
  border: solid .5px #ffffff;
  background-color: transparent;
  background-image: linear-gradient(to top, rgba(0, 0, 0, .5), transparent, rgba(255, 255, 255, .5));
  background-size: cover;
  text-align: left;
  padding-left: 44px;
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  opacity: 1;
  transition-duration: .5s;
  cursor: pointer;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.song-button:focus {
  background-color: rgb(0, 0, 0, .8);
  height: 80px;
  padding-left: 86px;
}
.song-button:hover {
  height: 80px;
  padding-left: 86px;
}
.AlbumThumbnail {
  height: 100%; /* Fill the height of the button */
  width: auto; /* Maintain the aspect ratio */
  margin: 0px;
  padding: 0px;
  position: absolute;
  top: 0px;
  left: 0px;
  z-index: 0;
  transition-duration: .5s;
}
.BuyButtonIcon {
  width: auto;
  height: 1.5em;
  display: block; /* prevents inline spacing */
  object-fit: contain; /* preserves aspect ratio */
  margin: .5em;
}
.PwkeyIcon {
  height: 3em;
  width: auto;
}
.audio-player {
  width: 100%;
  background-color: transparent;
  border: none;
}
.embedBtn {
  cursor: pointer;
  margin-bottom: -13px;
  border: inline-block;
  cursor: pointer;
  height: 40px;
  width: auto;
}
.chatBtn {
  cursor: pointer;
  border: inline-block;
  cursor: pointer;
  height: 40px;
  width: auto;
  position: relative;
  z-index: 0;
}
.nextprev-btn {
  cursor: pointer;
  margin-bottom: -13px;
  width: 40px;
  height: 40px;
}
#playBtn {
  cursor: pointer;
  border: none;
  display: block;
}
/* Play button */
#playLogo {
  height: auto;
  width: 100px;
  position: relative;
  z-index: 2;
  cursor: pointer;
  transition-duration: .3s;
  max-width: 100%;
  animation: bounce .5s ease infinite;
}
#buyBtn {
  cursor: pointer;
  border: none;
  display: block;
}
#buyLogo {
  height: auto;
  width: 100px;
  max-width: 100%;
}
.MusicButton {
  height: 93px;
  width: auto;
  position: relative;
  display: block; 
  text-decoration: none; 
  color: inherit;
}
/* Listen counter badge */
.moreInfo {
  color: #ffffff;
  font-family: 'futura';
  position: absolute;
  left: 0;
  bottom: 12px;
  width: 100%;
  height: 20px;
  line-height: 20px;
  z-index: 3;
  font-size: 12px;
  opacity: 0;
  display: block;
  pointer-events: none;
  background-color: rgba(0, 0, 0, .9);
  transition-duration: .8s;
  overflow: hidden;
}
/*----Bars----*/
.SongProgressBar {
  position: relative;
  bottom: 0px;
  height: 40px;
}
/*---- Volume ----*/
.volumeBtn {
  line-height: 40px;
  height: 40px;
  width: auto;
}
#volumeControl {
  position: relative;
  display: block;
  height: 20px;
  margin: 0;
  padding: 0;
  width: 100%;
  box-sizing: border-box;
}
.volumeContainer {
  height: 40px;
  width: 80px;
  display: block;
}
.progressBar {
  width: 80px;
  height: 10px;
  max-width: 100%;
  background-color: rgba(0, 0, 0, .8);
  border: solid 1px #ffffff;
  cursor: pointer;
  overflow: hidden;
  margin: 0px 5px 0px 5px;
  border-radius: 90px;
}
.progressBar span {
  display: block;
  height: 100%;
  background-color: #ffffff;
  width: 0;
}
input::placeholder {
  color: #ffffff;
}
input:focus {
  animation: none;
  outline: none;
}
input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  -webkit-appearance: none;
  background: transparent;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
  border: solid 1px #000000;
  margin-bottom: 10px;
}
/* Range input styling */
input[type="range"] {
  background-color: transparent;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
}
input[type=range]::-webkit-slider-runnable-track {
  background-color: #000000;
  border: solid 1px #ffffff;
  width: 100%;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
}
input[type=range] {
  width: 100%;
  margin: 0; /* Prevent extra margin */
  padding: 0;
  overflow: visible;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  background: #000000;
  border: solid 1px #ffffff;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  margin-top: -6px;
}
#embedOverlay,
#chatOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
  color: #000000;
}
.embedContent,
.chatContent {
  width: 100%;
  height: 100%;
  background: transparent;
  background-image: linear-gradient(to top, rgba(255, 255, 255, .8), rgba(0, 0, 0, .8));
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.MoreInner {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  padding: 40px 5px 10px 5px;
  box-sizing: border-box;
  overflow: hidden;
  min-width: 0;
}
.MoreHeader {
  font-size: 1.15em;
  flex: 0 0 auto;
  text-align: center;
  max-width: 100%;
  text-overflow: ellipsis;
  white-space: nowrap;
  overflow: hidden;
  color: #ffffff;
}
.MoreBody {
  flex: 1;
  overflow-y: auto;
  width: calc(100% - 1px);
  border: solid .5px transparent;
  border-radius: 5px;
  background-color: rgba(0, 0, 0, .1);
}
.MoreInner textarea {
  font-size: .8em;
  line-height: 1.6em;
  flex: 1;
  padding: 5px;
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  resize: none;
  min-width: 0;
  display: block;
  border: none;
  overflow-x: hidden;
}
#closeEmbed,
#closeChat {
  font-size: 18px;
  color: #000000;
  position: absolute;
  top: 0px;
  right: 0px;
  margin: 5px;
  cursor: pointer;
  height: 40px;
  width: 40px;
  border-radius: 50%;
  border: solid 1px #000000;
  background-color: #ffffff;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  z-index: 11;
  outline: none;
}
.chatEmbed {
  text-align: center;
  line-height: 2em;
  height: calc(100% - 40px);
  width: 100%;
  overflow-y: scroll;
  text-overflow: ellipsis;
}
.chatPosts {
  padding: 0px;
  margin: 0px; 
  width: 100%;
  max-width: 100%;
  flex: 1;
  font-size: 1em;
  line-height: 1.7em;
  overflow-y: auto;
  overflow-x: hidden;
  min-width: 0;
  word-break: break-word;
  overflow-wrap: anywhere;
  box-sizing: border-box;
}
li {
  list-style: none;
  background-color: #ffffff;
  border-radius: 8px;
  box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.4);
  margin: 0px auto 15px auto;
  padding: 10px 10px 55px 10px;
  width: calc(100% - 40px);
  max-width: 400px;
  text-align: center;
  position: relative;
  pointer-events: none; /* disable clicks on the li */
}
.love {
  height: 45px;
  overflow: hidden;
  position: absolute;
  width: 100%;
  left: 50%;
  bottom: 5px;
  cursor: pointer;
  transition-duration: .5s;
  pointer-events: auto;
  transform: translateX(-50%);
  display: flex;
  justify-content: center;
  align-items: center;
}
.love table {
  border-collapse: separate;
  border-spacing: 20px 0;
  margin: 0;
  padding: 0;
}
.love td,
.love th {
  padding: 0px;
}
.hearteffect {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 45px;
  height: 45px;
  z-index: 1;
}
.postbutton {
  margin: 2px;
  display: inline-block;
  font-size: 10px;
  position: relative;
  width: auto;
  height: auto;
  border-radius: 5px;
  transition-duration: .5s;
}
.postbutton:hover {
  background-color: rgb(0, 0, 0, .5);
}
.postreact {
  width: 45px; 
  height: 45px; 
  background-image: url('fmp3simages/Email.png'); 
  background-size: 35px 35px;
  background-position: center center;
  background-repeat: no-repeat;
}
.postname {
  margin: 5px;
}
.hearteffect2 {
  position: relative;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  width: 45px;
  height: 45px;
  z-index: 1;
  background-image: url('fmp3simages/PWBUY.png');
  background-size: cover;
  background-position: center center;
  transition-duration: .5s;
}
.hearteffect2:hover {
  background-color: rgb(0, 0, 0, .5);
}
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: url('fmp3simages/Heart.png') center/contain no-repeat;
  opacity: 0;
  animation: floatHeart 1s infinite linear;
  background-color: transparent;
}
/* 4 locations */
.h1 { left: 5px;  bottom: 3px;  animation-delay: .25s; }
.h2 { left: 30px; bottom: 3px;  animation-delay: .50s; }
.h3 { left: 10px; bottom: 3px;  animation-delay: .75s; }
.h4 { left: 20px; bottom: 3px;  animation-delay: 1s; }

.playcount {
  width: auto;
  min-width: 90px;
  text-align: center;
  font-size: 12px;
  font-weight: bold;
  line-height: 10px;
  z-index: 3;
  position: absolute;
  right: 0px;
  top: 0;
  bottom: 0;
  padding: 0px 10px 0px 100px;
  background-size: auto 100px;
  background-position: left center;
  background-image: linear-gradient(to right, transparent, rgba(20, 20, 20, .9) 100px, rgba(20, 20, 20, .9));
  border-bottom-right-radius: 20px; /* Needed for backdrop filter */
  color: #f0e2ff;
  -webkit-text-stroke: .02em #000000;
  display: flex;
  align-items: center;   /* vertical centering */
  justify-content: center;
}
/*------100vh Controls Sum Landscape = 217px (with frame) + 195px (without frame)-------*/

@media screen and (max-width: 500px) {
.songSelection {
  opacity: 1;
}
.Seven {
  background-image: none;
}
.Seven {
  height: calc(100vh - 217px);
  }
.MusicHeader {
  max-width: 100%;
  margin: 0px;
}
.Password {
  line-height: 50px;
  height: 50px; 
  font-size: 22px;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.PasswordSubmit {
  height: 50px;
  font-size: 22px;
  width: auto;
}
.PasswordBar {
  max-height: 50px;
  line-height: 50px;
  height: 0px;
}
.LancasterFrame:hover .PasswordBar {
  height: 50px;
}
.MusicHeader {
  transition-duration: .2s;
  padding: 40px 0px 50px 0px;
  max-height: 251px;
  overflow: hidden;
}
.volumeContainer {
    display: none;
  }
.embedBtn {
    display: none;
  }
/*----Music----*/
.OffMusicHeader {
  height: calc(100vh - 195px);
  min-height: calc(100vh - 195px);
}
}

/* ------------ Miniature Adjustments ----------*/
@media screen and (max-height: 300px) {
.embedBtn {
  display: none;
}
.XBtn {
  display: inline-block;
}
.nextprev-btn {
  display: inline-block;
}
.volumeContainer {
  display: none;
}
.shuffleBtn {
  display: none;
}
.progressBar {
  display: inline-block;
  width: 50px;
  height: 10px;
  max-width: 100%;
}
#playBtn {
  height: 90px;
  line-height: 90px;
}
.ControlBar {
  justify-content: center;
}
}

@supports (-webkit-touch-callout: none) {
  .songSelection {
  opacity: 1;
}
  .Seven {
  background-image: none;
}
  .volumeContainer {
    display: none;
  }
}

@keyframes bounce {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

@keyframes rise {
  0% { background-position: center 0px; }
  100% { background-position: center -400px; }
}

@keyframes floatHeart {
  0% {
    opacity: 0;
    transform: translateY(0) scale(.6);
  }

  15% {
    opacity: 1;
  }

  75% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: translateY(-35px) scale(1);
  }
}
</style>
</head>
<body>
<!------Music Player------>
<div class="LancasterFrame" id="LancasterFrame">
<div class="LancasterMusicPlayer">
  
  <!----PayOn---->
        <div id="PayOn">
          <div class="Seven">
          <div class="songSelection" id="songSelection"  alt="Song Selector" title="Song Selector">
            <div class="shuffleBtn"  onclick="shuffle()" alt="Shuffle" title="Shuffle"></div>
          <div align='center'>
            <audio id="introAudio" preload="auto" src="fmp3smusic/Sale.mp3"></audio>
            <button preload="auto" class ="song-button GoodForYou" data-song="fmp3smusic/GoodForYou.mp3"><img src="fmp3simages/GoodForYou.jpg" class="AlbumThumbnail">"Good For You"<span class="playcount">0</span></button>
            <button preload="auto" class ="song-button MoreThanJustAFan" data-song="fmp3smusic/MoreThanJustAFan.mp3"><img src="fmp3simages/MoreThanJustAFan.jpg" class="AlbumThumbnail">"More Than Just A Fan"<span class="playcount">0</span></button>
