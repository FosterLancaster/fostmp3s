<!DOCTYPE html>
<html lang="en">
<head>
<!-- Foster Lancaster -->
<title>fostmp3s version 3.0</title>

<!-- Style Sheets -->

<!-- Fost Mp3's
<iframe src="https://fosterlancaster.github.io/fostmp3s" style="width: 400px; height: 400px; min-height: 400px; min-width: 200px; max-height: 100%; display: block; border: none;" class="fostmp3s"></iframe>
Fost Mp3's -->

<style>
a {
  text-decoration: none;
  color: #000000;
}
button {
  outline: none;
}
html,
body {
  margin: 0;
  padding: 0;
  font-family: 'futura';
}
/* Hide default audio controls */
.fostmp3s {
  display: block;
}
.MainLogo {
  height: 30px; 
  width: auto;
  margin: 5px;
  float: right;
}
audio {
  display: none;
}
.audio-player-container img.default-image {
  display: block;
}
.audio-player-container img.playing {
  display: none;
}
#PayOff {
  display: none;
  position: relative;
 }
 #PayOn {
  width: calc(100% - 1px);
  display: block;
  position: relative;
 }
td {
  padding: 0;
}
table {
  border-spacing: 0;
}
.volumeContainer:hover, 
.nextprev-btn:hover, 
.embedBtn:hover, 
.chatBtn:hover {
  background-color: rgba(255, 255, 255, .8);
}
.EngageBar td:hover {
  background-color: rgba(255, 255, 255, .8);
}
.progressBar:hover {
  background-color: #7D7F7C;
}
 .LancasterFrame {
  font-size: 18px;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 2;
  opacity: 1;
  background-color: rgba(255, 255, 255, .1);
  background-image: linear-gradient(to top, rgba(0, 0, 0, .4), transparent, rgba(0, 0, 0, .4));
  background-size: 100% 400px;
  background-position: center center;
  animation: rise 4s linear infinite;
}
.LancasterFrame:hover .ControlBar {
  height: 40px;
}
.LancasterFrame:hover .PasswordBar {
  height: 40px;
  opacity: 1;
}
.LancasterFrame:hover .MusicHeader {
  padding: 0px;
}
#playBtn:hover .moreInfo {
  opacity: 1;
}
#buyBtn:hover .moreInfo {
  opacity: 1;
}
.PasswordBar:hover .PasswordSubmit {
  width: 100px;
  max-width: 100px;
}
.MusicHeader {
  transition-duration: .2s;
  padding: 40px 0px 40px 0px;
  position: relative;
  text-align: left;
  max-height: 250px;
  overflow: hidden;
  max-width: 100%;
}
 .LancasterMusicPlayer {
  width: 100%;
  height: 100%; /* Important */
  text-align: center;
  color: #d3d3d3;
  position: relative;
  overflow: hidden;
  background-image: url('fmp3simages/FostBranding.png');
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}
/*----Bars----*/
.Password {
  font-size: 19px;
  font-family: 'Futura';
  line-height: 40px;
  height: 40px;
  padding: 0 10px;
  box-sizing: border-box;
  margin: 0px;
  text-indent: 5px;
  width: 100%;
  max-width: 100%;
  -webkit-appearance: none;
  color: #ffffff;
  appearance: none;
  flex-grow: 1; /* if in a flex container */
  min-width: 0; /* prevent overflow in flex */
  overflow: hidden;
  background-color: transparent;
  border: none;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.PasswordSubmit {
  transition-duration: .1s;
  font-size: 19px;
  font-family: 'futura';
  height: 40px;
  margin: 0px;
  width: 0px;
  max-width: 0px;
  color: #ffffff;
  text-align: center;
  cursor: pointer;
  user-select: none; /* prevent highlighting text */
  pointer-events: auto;
  background-color: #ffffff;
}
.PasswordSubmit:hover {
  background-color: rgba(0, 0, 0, .5);
}
.PasswordBar {
  max-height: 40px;
  line-height: 40px;
  height: 0px;
  opacity: 0;
  transition-duration: .2s;
  width: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  width: calc(100% - 12px);
  overflow: hidden;
  border-radius: 90px;
  background-position: bottom center;
  background-size: auto 30px;
  background-attachment: scroll;
  background-repeat: no-repeat;
  border: double 5px #ffffff;
  background-color: #000000;
  background-image: url('fmp3simages/FostMp3sLogoBW.png');
}
/* PasswordUnlockBar */
.PasswordUnlockBar {
  position: relative;
  width: 100%;
  left: 0px;
  overflow: hidden;
  margin: 0px;
  background-color: transparent;
}
.EngageBar {
  height: 93px;
  display: block;
  overflow: hidden;
}
.EngageBar table {
  height: 93px;
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;        /* 🔑 forces equal-width cells */
}
.EngageBar td {                 /* each td = half */
  text-align: center;
  vertical-align: middle;     /* vertical center for table */
  padding: 0;
  outline: none;
  box-shadow: none;
}
/* Center content inside each td */
.EngageBar td > * {
  justify-content: center;
  align-items: center;
  display: flex;
  height: 100%;
  width: 100%;
}
.EngageBar td:focus,
.EngageBar td:active {
  outline: none;
  box-shadow: none;
}
.ControlBar {
  max-height: 40px;
  line-height: 40px;
  height: 0px;
  transition: height .2s ease;
  overflow: hidden;
  display: flex;
  align-items: center;      
  border: none;
  justify-content: center;
  border-top: none;
  position: relative;
  z-index: 3;
}
.songSelection {
  height: 100%;
  overflow-y: scroll;
  position: relative;
  opacity: .05;
  display: block;
  z-index: 3;
  transition-duration: .3s;
}
/*------100vh Controls Sum Landscape = 246px (with frame) + 224px (without frame)-------*/
/*----Bars----*/
.songSelection.revealed,
.songSelection:hover {
  opacity: 1;
}
.Seven.revealed {
  background-image: none;
}
.Seven {
  width: calc(100% - 42px);
  margin-left: auto;
  margin-right: auto;
  height: calc(100vh - 246px);
  border: solid 11px rgba(150, 150, 150, .3);
  position: relative; /* important */
  opacity: 1;
  background-image: url('fmp3simages/SongSelect.png');
  background-size: auto 40%;
  background-position: center center;
  background-repeat: no-repeat;
  overflow-x: hidden;
  overflow-y: scroll;
}
.shuffleBtn {
  position: relative;
  opacity: 1 !important;
  cursor: pointer;
  height: 38px;
  width: 100%;
  border-radius: 0px;
  z-index: 1;
  background-color: transparent;
  text-align: center;
  background-image: url('fmp3simages/Shuffle.png');
  background-size: 38px 38px;
  background-position: center center;
  background-repeat: no-repeat;
}
.shuffleBtn:hover {
  background-color: rgba(255, 255, 255, .8);
}
.OffMusicHeader {
  height: calc(100vh - 224px);
  min-height: calc(100vh - 224px);
  width: 100%;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  color: #ffffff;
  font-size: 7vw;
  text-decoration: underline;
  max-width: 95%;
  overflow: hidden;
  background-image: url('fmp3simages/PWBUY.png');
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}
.songbutton {
  -webkit-text-stroke: .05em #000000;
  font-family: 'futura';
  font-size: 16px;
  color: #ffffff;
  position: relative;
  width: calc(100% - 1px);
  margin: 1px 0;
  overflow: hidden;
  height: 38px;
  line-height: 18px;
  border: solid .5px #ffffff;
  background-color: transparent;
  background-image: linear-gradient(to top, rgba(0, 0, 0, .5), transparent, rgba(255, 255, 255, .5));
  background-size: cover;
  text-align: left;
  padding-left: 44px;
  padding-right: 90px;
  box-sizing: border-box;
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  opacity: 1;
  transition-duration: .5s;
  cursor: pointer;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: flex;
  align-items: center; /* Centers text vertically */
}
.songbutton:focus {
  background-color: rgb(0, 0, 0, .8);
  height: 80px;
  padding-left: 86px;
}
.songbutton:hover {
  height: 80px;
  padding-left: 86px;
}
.SongTitle {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.playcountframe {
  font-size: 14px;
  position: absolute;
  top: 0;
  right: 0px;
  padding: 0px 5px 0px 5px;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: right;
  text-align: center;
  line-height: 1.1;
  transition-duration: .5s;
  width: auto;
  background-color: transparent;
  flex-shrink: 0;
}
.plays {
  position: static;
  white-space: nowrap;
}
.playcount {
  position: static; /* remove the absolute positioning */
}
.AlbumThumbnail {
  height: 100%; /* Fill the height of the button */
  width: auto; /* Maintain the aspect ratio */
  margin: 0px;
  padding: 0px;
  position: absolute;
  top: 0px;
  left: 0px;
  z-index: 0;
  transition-duration: .5s;
}
.BuyButtonIcon {
  width: auto;
  height: 1.5em;
  display: block; /* prevents inline spacing */
  object-fit: contain; /* preserves aspect ratio */
  margin: .5em;
}
.PwkeyIcon {
  height: 3em;
  width: auto;
}
.audio-player {
  width: 100%;
  background-color: transparent;
  border: none;
}
.embedBtn {
  cursor: pointer;
  margin-bottom: -13px;
  border: inline-block;
  cursor: pointer;
  height: 40px;
  width: auto;
}
.chatBtn {
  cursor: pointer;
  border: inline-block;
  cursor: pointer;
  height: 40px;
  width: auto;
  position: relative;
  z-index: 0;
}
.nextprev-btn {
  cursor: pointer;
  margin-bottom: -13px;
  width: 40px;
  height: 40px;
}
#playBtn {
  cursor: pointer;
  border: none;
  display: block;
}
/* Play button */
#playLogo {
  height: auto;
  width: 100px;
  position: relative;
  z-index: 2;
  cursor: pointer;
  transition-duration: .3s;
  max-width: 100%;
  animation: bounce .5s ease infinite;
}
#buyBtn {
  cursor: pointer;
  border: none;
  display: block;
}
#buyLogo {
  height: auto;
  width: 100px;
  max-width: 100%;
}
.MusicButton {
  height: 93px;
  width: auto;
  position: relative;
  display: block; 
  text-decoration: none; 
  color: inherit;
}
/* Listen counter badge */
.moreInfo {
  color: #ffffff;
  font-family: 'futura';
  position: absolute;
  left: 0;
  bottom: 12px;
  width: 100%;
  height: 20px;
  line-height: 20px;
  z-index: 3;
  font-size: 12px;
  opacity: 0;
  display: block;
  pointer-events: none;
  background-color: rgba(0, 0, 0, .9);
  transition-duration: .8s;
  overflow: hidden;
}
/*----Bars----*/
.SongProgressBar {
  position: relative;
  bottom: 0px;
  height: 40px;
}
/*---- Volume ----*/
.volumeBtn {
  line-height: 40px;
  height: 40px;
  width: auto;
}
#volumeControl {
  position: relative;
  display: block;
  height: 20px;
  margin: 0;
  padding: 0;
  width: 100%;
  box-sizing: border-box;
}
.volumeContainer {
  height: 40px;
  width: 80px;
  display: block;
}
.progressBar {
  width: 80px;
  height: 10px;
  max-width: 100%;
  background-color: rgba(0, 0, 0, .8);
  border: solid 1px #ffffff;
  cursor: pointer;
  overflow: hidden;
  margin: 0px 5px 0px 5px;
  border-radius: 90px;
}
.progressBar span {
  display: block;
  height: 100%;
  background-color: #ffffff;
  width: 0;
}
input::placeholder {
  color: #ffffff;
}
input:focus {
  animation: none;
  outline: none;
}
input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  -webkit-appearance: none;
  background: transparent;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
  border: solid 1px #000000;
  margin-bottom: 10px;
}
/* Range input styling */
input[type="range"] {
  background-color: transparent;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
}
input[type=range]::-webkit-slider-runnable-track {
  background-color: #000000;
  border: solid 1px #ffffff;
  width: 100%;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
}
input[type=range] {
  width: 100%;
  margin: 0; /* Prevent extra margin */
  padding: 0;
  overflow: visible;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  background: #000000;
  border: solid 1px #ffffff;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  margin-top: -6px;
}
#embedOverlay,
#chatOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
  color: #000000;
}
.embedContent,
.chatContent {
  width: 100%;
  height: 100%;
  background: transparent;
  background-image: linear-gradient(to top, rgba(255, 255, 255, .8), rgba(127.5, 127.5, 127.5, .8));
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.MoreInner {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  padding: 40px 5px 10px 5px;
  box-sizing: border-box;
  overflow: hidden;
  min-width: 0;
}
.MoreHeader {
  font-size: 1.15em;
  flex: 0 0 auto;
  text-align: center;
  max-width: 100%;
  text-overflow: ellipsis;
  white-space: nowrap;
  overflow: hidden;
  color: #ffffff;
  border-bottom: solid .5px #ffffff;
}
.MoreBody {
  flex: 1;
  overflow-y: auto;
  width: calc(100% - 1px);
  border: solid .5px transparent;
  border-radius: 5px;
  background-color: rgba(0, 0, 0, .1);
}
.MoreInner textarea {
  font-size: .8em;
  line-height: 1.6em;
  flex: 1;
  padding: 5px;
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  resize: none;
  min-width: 0;
  display: block;
  border: none;
  overflow-x: hidden;
}
#closeEmbed,
#closeChat {
  font-size: 18px;
  color: #000000;
  position: absolute;
  top: 0px;
  right: 0px;
  margin: 5px;
  cursor: pointer;
  height: 40px;
  width: 40px;
  border-radius: 50%;
  border: solid 1px #000000;
  background-color: #ffffff;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  z-index: 11;
  outline: none;
}
.chatEmbed {
  text-align: center;
  line-height: 2em;
  height: calc(100% - 40px);
  width: 100%;
  overflow-y: scroll;
  text-overflow: ellipsis;
}
.chatPosts {
  padding: 0px;
  margin-top: 15px; 
  width: 100%;
  max-width: 100%;
  flex: 1;
  font-size: 1em;
  line-height: 1.7em;
  overflow-y: auto;
  overflow-x: hidden;
  min-width: 0;
  word-break: break-word;
  overflow-wrap: anywhere;
  box-sizing: border-box;
}
li {
  list-style: none;
  background-color: #ffffff;
  border-radius: 8px;
  box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.4);
  margin: 0px auto 15px auto;
  padding: 10px 10px 55px 10px;
  width: calc(100% - 40px);
  max-width: 400px;
  text-align: center;
  position: relative;
  pointer-events: none; /* disable clicks on the li */
}
.love {
  height: 45px;
  overflow: hidden;
  position: absolute;
  width: 250px;
  max-width: 250px;
  left: 50%;
  bottom: 5px;
  cursor: pointer;
  transition-duration: .5s;
  pointer-events: auto;
  transform: translateX(-50%);
  display: flex;
  justify-content: center;
  align-items: center;
}
.love table {
  border-collapse: separate;
  border-spacing: 20px 0;
  margin: 0;
  padding: 0;
}
.love td,
.love th {
  padding: 0px;
}
.hearteffect {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 2em;
  height: 2em;
  z-index: 1;
}
.postbutton {
  margin: 2px;
  display: inline-flex;
  align-items: center;      /* vertical center */
  justify-content: center;  /* centers contents if there's extra space */
  position: relative;
  width: auto;
  height: 2em;
  max-height: 45px;
  border-radius: 5px;
  transition-duration: .5s;
}
.postbutton:hover {
  background-color: rgb(0, 0, 0, .5);
}
.postreact {
  width: 2em;
  height: 2em;
  max-width: 45px;
  max-height: 45px;
  background-image: url('fmp3simages/Email.png');
  background-size: 2em 2em;
  background-position: center;
  background-repeat: no-repeat;
  flex-shrink: 0;
}
.hearteffect2 {
  position: relative;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  width: 2em;
  height: 2em;
  z-index: 1;
  background-image: url('fmp3simages/PWBUY.png');
  background-size: cover;
  background-position: center center;
  transition-duration: .5s;
}
.hearteffect2:hover {
  background-color: rgb(0, 0, 0, .5);
}
.heart {
  position: absolute;
  width: 45%;
  height: 45%;
  background: url('fmp3simages/Heart.png') center/contain no-repeat;
  opacity: 0;
  animation: floatHeart 1s infinite linear;
  background-color: transparent;
}
/* 4 locations */
.h1 { left: 0%;  bottom: 5%;  animation-delay: .25s; }
.h2 { left: 40%; bottom: 5%;  animation-delay: .50s; }
.h3 { left: 20%; bottom: 5%;  animation-delay: .75s; }
.h4 { left: 60%; bottom: 5%;  animation-delay: 1s; }
/*------100vh Controls Sum Landscape = 256px (with frame) + 234px (without frame)-------*/

@media screen and (max-width: 500px) {
.Seven {
  height: calc(100vh - 256px);
  }
.MusicHeader {
  max-width: 100%;
  margin: 0px;
}
.Password {
  line-height: 50px;
  height: 50px; 
  font-size: 22px;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.PasswordSubmit {
  height: 50px;
  font-size: 22px;
  width: auto;
}
.PasswordBar {
  max-height: 50px;
  line-height: 50px;
  height: 0px;
}
.LancasterFrame:hover .PasswordBar {
  height: 50px;
}
.MusicHeader {
  transition-duration: .2s;
  padding: 40px 0px 50px 0px;
  max-height: 251px;
  overflow: hidden;
}
.volumeContainer {
    display: none;
  }
.embedBtn {
    display: none;
  }
/*----Music----*/
.OffMusicHeader {
  height: calc(100vh - 234px);
  min-height: calc(100vh - 234px);
}
}

/* ------------ Miniature Adjustments ----------*/
@media screen and (max-height: 300px) {
.embedBtn {
  display: none;
}
.XBtn {
  display: inline-block;
}
.nextprev-btn {
  display: inline-block;
}
.volumeContainer {
  display: none;
}
.shuffleBtn {
  display: none;
}
.progressBar {
  display: inline-block;
  width: 50px;
  height: 10px;
  max-width: 100%;
}
#playBtn {
  height: 90px;
  line-height: 90px;
}
.ControlBar {
  justify-content: center;
}
}

@supports (-webkit-touch-callout: none) {
  .volumeContainer {
    display: none;
  }
}

@keyframes bounce {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

@keyframes rise {
  0% { background-position: center 0px; }
  100% { background-position: center -400px; }
}

@keyframes floatHeart {
  0% {
    opacity: 0;
    transform: translateY(0) scale(.6);
  }

  15% {
    opacity: 1;
  }

  75% {
    opacity: 1;
  }

  100% {
    opacity: 0;
    transform: translateY(-35px) scale(1);
  }
}
</style>
</head>
<body>
<!------Music Player------>
<div class="LancasterFrame" id="LancasterFrame">
<div class="LancasterMusicPlayer">
  <img class="MainLogo" src="fmp3simages/FostMp3sLogo.png">
  
  <!----PayOn---->
        <div id="PayOn">
          <div class="Seven">
          <div align='center'>
            <div class="songSelection" id="songSelection"  alt="Song Selector" title="Song Selector">
            <audio id="introAudio" preload="auto" src="fmp3smusic/Sale.mp3"></audio>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
  import {
    getDatabase,
    ref,
    update,
    increment,
    onValue,
    runTransaction
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDwdEA58IKndfdO1SvfD4pGerAbW3bRgWw",
    authDomain: "fostmp3s-3fc35.firebaseapp.com",
    databaseURL: "https://fostmp3s-3fc35-default-rtdb.firebaseio.com",
    projectId: "fostmp3s-3fc35",
    storageBucket: "fostmp3s-3fc35.firebasestorage.app",
    messagingSenderId: "792229622105",
    appId: "1:792229622105:web:a644d281c868293b131c48",
    measurementId: "G-RJWTKMEWV3"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const database = getDatabase(app);

  let lastPlayedSongId = null;
  const highestDisplayed = {};
  const dailyChecked = {};

  //Play Rate
  const PLAYS_PER_6H = 5000;
  const RATE_PER_MS = PLAYS_PER_6H / (6 * 60 * 60 * 1000);
  const DAY = 24 * 60 * 60 * 1000;

  function getSongId(songPath) {
    return songPath.replace(/[^a-zA-Z0-9]/g, "_");
  }

  function getToday() {
    return new Date().toISOString().split("T")[0];
  }

  function formatPlays(num) {
    if (num >= 1_000_000_000) {
      return (num / 1_000_000_000).toFixed(1) + "B";
    }
    if (num >= 1_000_000) {
      return (num / 1_000_000).toFixed(1) + "M";
    }
    if (num >= 1_000) {
      return (num / 1_000).toFixed(1) + "K";
    }
    return num.toLocaleString();
  }

  function getDailyBoost(songId) {

    const now = new Date();

    // changes every 6 hours
    const block = Math.floor(now.getHours() / 6);

    let hash = 0;

    const key =
      songId +
      now.toISOString().split("T")[0] +
      block;

    for (let i = 0; i < key.length; i++) {
      hash += key.charCodeAt(i);
    }

    //Play Rate Extra
    return hash % 2 === 0 ? 555 : 0;

  }

async function commitDailyGrowth(songRef, songId) {
  await runTransaction(songRef, (data) => {
    const now = Date.now();
    const COMMIT_INTERVAL = 6 * 60 * 60 * 1000;

    if (!data) {
      return {
        plays: 0,
        lastUpdated: now,
        dailyBoost: getDailyBoost(songId),
        boostDate: getToday()
      };
    }

    const lastUpdated = data.lastUpdated || now;
    const elapsed = now - lastUpdated;

    if (elapsed < COMMIT_INTERVAL) {
      return data;
    }

    const growth = Math.floor(elapsed * RATE_PER_MS);

    return {
      ...data,
      plays: (data.plays || 0) + growth,
      lastUpdated: now,
      dailyBoost: getDailyBoost(songId),
      boostDate: getToday()
    };
  });
}

 function setupFirebasePlayCounts(songButtons) {
  songButtons.forEach(button => {
    const songId = getSongId(button.dataset.song);
    const songRef = ref(database, `songs/${songId}`);

    onValue(songRef, snapshot => {
      const data = snapshot.val() || {};

      if (!dailyChecked[songId]) {
        dailyChecked[songId] = true;
        commitDailyGrowth(songRef, songId);
      }

      const el = button.querySelector('.playcount');
      if (!el) return;

      const basePlays = data.plays || 0;
      const lastUpdated = data.lastUpdated || Date.now();
      const today = getToday();

      if (!data.boostDate || data.boostDate !== today) {
        update(songRef, {
          dailyBoost: getDailyBoost(songId),
          boostDate: today
        });
      }

      function updateDisplay() {
        const elapsed = Date.now() - lastUpdated;

        const estimatedGrowth = Math.floor(
          Math.max(0, elapsed) * RATE_PER_MS
        );

        const dailyBoost = getDailyBoost(songId);

        let displayPlays =
          basePlays + estimatedGrowth + dailyBoost;

        // Never allow the displayed number to decrease
        if (highestDisplayed[songId] !== undefined) {
          displayPlays = Math.max(
            displayPlays,
            highestDisplayed[songId]
          );
        }

        highestDisplayed[songId] = displayPlays;

        const shortText = formatPlays(displayPlays);
        const fullText = displayPlays.toLocaleString();

        // Show full number while hovering anywhere over the song button
        if (button.matches(':hover')) {
          el.textContent = fullText;
        } else {
          el.textContent = shortText;
        }
      }

      // Display immediately
      updateDisplay();

      // Prevent duplicate intervals
      if (el._interval) {
        clearInterval(el._interval);
      }

      el._interval = setInterval(updateDisplay, 1000);
    });
  });
}

function updatePlaycountText(button, songId) {
  if (!button || !songId) return;

  const el = button.querySelector('.playcount');
  if (!el) return;

  const displayPlays = highestDisplayed[songId] || 0;

  if (button.matches(':hover')) {
    el.textContent = displayPlays.toLocaleString();
  } else {
    el.textContent = formatPlays(displayPlays);
  }
}


async function commitSongPlay(songPath, button) {
  if (!songPath) return;

  const songId = getSongId(songPath);
  lastPlayedSongId = songId;

  highestDisplayed[songId] = (highestDisplayed[songId] || 0) + 1;
  updatePlaycountText(button, songId);

  try {
    await update(ref(database, `songs/${songId}`), {
      plays: increment(1)
      // DO NOT update lastUpdated here
    });
  } catch (err) {
    console.error("Firebase play increment failed:", err);
  }
}

// Time Update
function updateProgressFor(active) {
  if (!progress) return;
  if (!isNaN(active.duration) && active.duration > 0) {
    progress.style.width = `${(active.currentTime / active.duration) * 100}%`;
  } else {
    progress.style.width = '0%';
  }
}
                
if (audio) {

  audio.addEventListener('timeupdate', () => updateProgressFor(audio));

window.shuffle = () => {
  const container = document.getElementById("songSelection");
  if (!container || songButtons.length === 0) return;
                
  // Order of Songs
  let newOrder = [...songButtons];
                
  // Set Current Song Apart
  if (window.currentsongindex !== -1 && songButtons[window.currentsongindex]) {
                
    // There is a "current" song – keep it at the top
    const currentBtn = songButtons[window.currentsongindex];
                
    // Remove Current Song
    newOrder = newOrder.filter(btn => btn !== currentBtn);
                
    // Shuffle Songs
    for (let i = newOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newOrder[i], newOrder[j]] = [newOrder[j], newOrder[i]];
    }
                
    // Put Current Up
    newOrder.unshift(currentBtn);
                
    // Set New Order
    newOrder.forEach(btn => container.appendChild(btn));
    songButtons = newOrder;
    window.currentsongindex = 0; // current song is now at top, but playback state is unchanged
                
  } else {
                
    // No current song selected: just shuffle and start the first one
    for (let i = newOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newOrder[i], newOrder[j]] = [newOrder[j], newOrder[i]];
    }
                
    newOrder.forEach(btn => container.appendChild(btn));
    songButtons = newOrder;
                
  }
}
fetchListenCountFromServer();
                
  // Launch Shuffle On Load

  window.shuffle();
